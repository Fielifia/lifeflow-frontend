stages:
  - install
  - lint
  - test
  - build

image: node:22

before_script:
  - cd my-app
  - npm ci

install:
  stage: install
  script:
    - npm ci
  artifacts:
    paths:
      - my-app/node_modules/

lint:
  stage: lint
  dependencies:
    - install
  script:
    - npm run lint

test:
  stage: test
  dependencies:
    - install
  script:
    - npm test -- --watchAll=false

build:
  stage: build
  dependencies:
    - install
  script:
    - npm run build

deploy:
  stage: build
  script:
    - echo "Deploy step"
  when: manual
