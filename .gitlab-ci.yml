stages:
  - install
  - lint
  - test
  - build

image: node:22

cache:
  paths:
    - my-app/node_modules/

before_script:
  - cd my-app

install:
  stage: install
  script:
    - npm install

lint:
  stage: lint
  script:
    - npm run lint

test:
  stage: test
  script:
    - npm test -- --watchAll=false

build:
  stage: build
  script:
    - npm run build
